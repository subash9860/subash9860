name: Generate Metrics

on:
  schedule:
    # Runs once a day at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # PAT with scopes: read:user, repo (classic). Add as repo secret METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: subash9860
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kathmandu

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage

          # Coding habits / when you commit
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Isometric 3D-style calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Most used languages as activity
          plugin_lines: yes
